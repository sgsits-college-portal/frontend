<div class="min-h-screen flex bg-[#f8f9ff]">
  
  <aside class="h-screen w-64 fixed left-0 top-0 hidden md:flex flex-col bg-white border-r border-[#c3c6d7]/40 shadow-sm z-50 py-6">
 <div class="px-6 mb-8">

    <div class="flex items-center gap-3">

        <div class="w-12 h-12 rounded-xl bg-[#FBF9F5] border border-[#F0EBE0] flex items-center justify-center">

            <span class="material-symbols-outlined text-3xl text-[#9E825A]">
                school
            </span>

        </div>

        <div>

            <h1 class="text-lg font-bold text-[#1A202C]">
                SGSITS
            </h1>

            <p class="text-xs text-[#718096]">
                College Portal
            </p>

            <span class="text-[10px] uppercase tracking-widest text-[#9E825A] font-semibold">
                Leave Management
            </span>

        </div>

    </div>

</div>
    <nav class="flex-1 flex flex-col gap-1 px-2">
      <a routerLink="/dashboard" class="flex items-center gap-3 px-4 py-3 text-[#585f68] hover:bg-[#eff4ff]/50 hover:text-[#004ac6] transition-all rounded-r-xl cursor-pointer">
        <span class="material-symbols-outlined text-xl">dashboard</span>
        <span class="text-sm">Dashboard</span>
      </a>
      <a routerLink="/apply-leave" class="flex items-center gap-3 px-4 py-3 border-l-4 border-[#004ac6] bg-[#eff4ff] text-[#004ac6] font-semibold rounded-r-xl cursor-pointer">
        <span class="material-symbols-outlined text-xl">calendar_add_on</span>
        <span class="text-sm">Apply Leave</span>
      </a>
      <a routerLink="/leave-history" class="flex items-center gap-3 px-4 py-3 text-[#585f68] hover:bg-[#eff4ff]/50 hover:text-[#004ac6] transition-all rounded-r-xl cursor-pointer">
        <span class="material-symbols-outlined text-xl">history</span>
        <span class="text-sm">Leave History</span>
      </a>
      <a routerLink="/admin-dashboard" class="flex items-center gap-3 px-4 py-3 text-[#585f68] hover:bg-[#eff4ff]/50 hover:text-[#004ac6] transition-all rounded-r-xl cursor-pointer">
        <span class="material-symbols-outlined text-xl">rule</span>
        <span class="text-sm">Admin View</span>
      </a>
    </nav>
  </aside>

  <main class="flex-1 md:ml-64 p-6 lg:p-8 flex justify-center items-start">
    <div class="w-full max-w-2xl bg-white rounded-2xl border border-[#c3c6d7]/30 shadow-sm p-6 md:p-8 mt-4">
      
      <header class="mb-6">
        <h3 class="text-2xl font-bold text-[#1A202C]">
Apply Leave
</h3>

<p class="text-sm text-[#718096] mt-1">
Submit your leave request through the College Portal.
</p>
      </header>

      <div *ngIf="successMessage" class="mb-4 p-3 text-xs text-green-700 bg-green-50 border border-green-200 rounded-xl">
        {{ successMessage }}
      </div>
      <div *ngIf="errorMessage" class="mb-4 p-3 text-xs text-red-700 bg-red-50 border border-red-200 rounded-xl">
        {{ errorMessage }}
      </div>

      <form (ngSubmit)="applyLeave()" #leaveForm="ngForm" class="space-y-5">
        
        <div>
          <label class="block text-xs font-semibold text-[#585f68] uppercase tracking-wider mb-1.5">Leave Type</label>
          <select 
            class="w-full h-11 px-4 rounded-xl border border-[#c3c6d7] bg-[#eff4ff]/20 focus:border-[#004ac6] focus:ring-0 text-sm"
            name="leaveType"
            [(ngModel)]="leaveType"
            required>
            <option value="" disabled selected>Select Leave type...</option>
            <option value="Casual Leave">Casual Leave</option>
            <option value="Sick Leave">Sick Leave</option>
            <option value="Earned Leave">Earned Leave</option>
          </select>
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label class="block text-sm font-semibold text-[#1A202C] mb-2">
    Start Date
</label>
            <input 
              type="date" 
              class="w-full h-11 px-4 rounded-xl border border-[#c3c6d7] bg-[#eff4ff]/20 focus:border-[#004ac6] focus:ring-0 text-sm"
              name="startDate"
              [(ngModel)]="startDate"
              required>
          </div>
          <div>
            <label class="block text-sm font-semibold text-[#1A202C] mb-2">
    End Date
</label>
            <input 
              type="date" 
              class="w-full h-11 px-4 rounded-xl border border-[#F0EBE0] bg-white focus:border-[#1D4ED8]  focus:ring-0 text-sm"
              name="endDate"
              [(ngModel)]="endDate"
              required>
          </div>
        </div>

        <div>
          <label class="block text-xs font-semibold text-[#585f68] uppercase tracking-wider mb-1.5">Reason for Absence</label>
          <textarea 
            class="w-full p-4 rounded-xl border border-[#c3c6d7] bg-[#eff4ff]/20 focus:border-[#004ac6] focus:ring-0 text-sm resize-none" 
            rows="4"
            placeholder="Enter the reason for your leave..."
            name="reason"
            [(ngModel)]="reason"
            required></textarea>
        </div>

        <div class="flex items-center justify-end gap-3 pt-4 border-t border-[#c3c6d7]/30">
          <button 
            type="button" 
            routerLink="/dashboard" 
            class="px-5 h-11 border border-[#c3c6d7] text-[#585f68] font-semibold text-xs rounded-xl hover:bg-gray-50 transition-all">
            Cancel
          </button>
          <button 
            type="submit" 
            class="px-6 h-11 bg-[#2563eb] text-white font-semibold text-xs rounded-xl hover:bg-[#004ac6] transition-all flex items-center gap-2 shadow-md shadow-blue-600/10"
            [disabled]="isLoading || !leaveForm.valid">
            <span *ngIf="isLoading" class="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"></span>
            {{ isLoading ? 'Processing...' : 'Submit Application' }}
          </button>
        </div>

      </form>

    </div>
  </main>
</div>
