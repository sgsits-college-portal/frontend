<header class="custom-header">
  <!-- Brand & Logo -->
  <div class="brand-section" (click)="backToDashboard()" style="cursor: pointer;">
    <div class="brand-logo">
      <i class="bi bi-calendar-event"></i>
    </div>
    <div>
      <h1 class="brand-title">SGSITS Event Portal</h1>
      <span class="brand-subtitle">Campus Events Redefined</span>
    </div>
  </div>

  <!-- User Profile & Action Box -->
  <div class="header-actions">
    <button (click)="backToDashboard()" class="btn btn-outline-secondary btn-sm " title="Back to Dashboard" style="display: inline-flex; align-items: center; gap: 0.35rem; font-weight: 500;">
      <i class="bi bi-grid-fill"></i>
      <span>Dashboard</span>
    </button>

    <div class="nav-user-actions" *ngIf="user() as currentUser">
      <div class="user-profile-card" style="border-right: none;">
        <div class="avatar-circle">
          {{ currentUser.fullName.charAt(0) }}
        </div>
        <div class="user-meta">
          <span class="user-name">{{ currentUser.fullName }}</span>
          <span class="user-role-badge" [ngClass]="currentUser.role.toLowerCase()">
            {{ currentUser.role }} <span *ngIf="currentUser.subRole && currentUser.subRole !== 'NONE'" class="sub-role-tag">({{ currentUser.subRole }})</span>
          </span>
        </div>
      </div>
    </div>

  </div>
</header>

<div class="sub-nav-bar">
  <div class="sub-nav-container">
    <div class="nav-links">

      <a routerLink="/events"
         routerLinkActive="active-tab"
         [routerLinkActiveOptions]="{exact: true}"
         class="nav-tab">
        <i class="bi bi-calendar-event-fill"></i>
        Events
      </a>

      @if (user()?.role === 'ADMIN' ||
      (user()?.role === 'STAFF' &&
      user()?.subRole === 'EVENT_MANAGER')) {

      <a routerLink="/events/create"
         routerLinkActive="active-tab"
         class="nav-tab">
        <i class="bi bi-plus-circle-fill"></i>
        Create Event
      </a>
      }

      <a routerLink="/events/participants"
         routerLinkActive="active-tab"
         class="nav-tab">
        <i class="bi bi-people-fill"></i>
        Registrations
      </a>

    </div>
  </div>
</div>
