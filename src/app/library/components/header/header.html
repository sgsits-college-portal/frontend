<header class="custom-header">
  <!-- Brand & Logo -->
  <div class="brand-section">
    <div class="brand-logo">
      <i class="bi bi-book-half"></i>
    </div>
    <div>
      <h1 class="brand-title">SGSITS Library Portal</h1>
      <span class="brand-subtitle">College Library Management System</span>
    </div>
  </div>

  <!-- Navigation Back to Dashboard -->
  <div style="display: flex; align-items: center; gap: 1rem;">
    <button (click)="backToDashboard()" class="btn btn-secondary btn-sm" title="Back to Dashboard" style="display: flex; align-items: center; gap: 0.35rem;">
      <i class="bi bi-arrow-left-short" style="font-size: 1.2rem; vertical-align: middle;"></i>
      <span>Back to Dashboard</span>
    </button>
  </div>
</header>
