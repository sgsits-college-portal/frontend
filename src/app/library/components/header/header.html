<header class="custom-header">
  <!-- Brand & Logo -->
  <div class="brand-section">
    <div class="brand-logo">
      <i class="bi bi-book-half"></i>
    </div>
    <div>
      <h1 class="brand-title">SGSITS Library Portal</h1>
      <span class="brand-subtitle">College Library Management System</span>
    </div>
  </div>

  <!-- Navigation Back to Dashboard & User Profile -->
  <div style="display: flex; align-items: center; gap: 1.5rem;">
    <button (click)="backToDashboard()" class="btn btn-outline-secondary btn-sm" title="Back to Dashboard" style="display: inline-flex; align-items: center; gap: 0.35rem; font-weight: 500;">
      <i class="bi bi-grid-fill"></i>
      <span>Dashboard</span>
    </button>

    <div class="user-profile-widget" *ngIf="user() as currentUser" style="border-left: 1px solid var(--card-border); padding-left: 1.5rem;">
      <div class="user-avatar">
        {{ currentUser.fullName.charAt(0) }}
      </div>
      <div class="user-details">
        <span class="user-name">{{ currentUser.fullName }}</span>
        <span class="user-role-badge">
          {{ currentUser.role }} <span *ngIf="currentUser.subRole && currentUser.subRole !== 'NONE'">({{ currentUser.subRole }})</span>
        </span>
      </div>
    </div>
  </div>
</header>
